        <div class="lg:col-span-5 flex flex-col gap-6 w-full">

                <div class="flex justify-between items-start mb-8">
                    <div class="flex flex-col">
                        <span id="active-id" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Département</span>
                        <h2 id="active-name" class="text-3xl font-black text-slate-900 leading-tight tracking-tight">-</h2>
                    </div>
                    <div class="bg-[#141414] text-white px-5 py-4 rounded-3xl text-center shadow-lg transform rotate-2 shrink-0">
                        <div id="active-score" class="text-4xl font-black">0</div>
                        <div class="text-[9px] uppercase font-bold text-slate-400 mt-1">Score Global / 100</div>
                    </div>
                </div>
                <div id="active-details" class="space-y-4"></div>
                <button onclick="resetUI()" class="mt-6 w-full py-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="arrow-left" class="inline w-3 h-3 mr-1"></i> Retour à la liste
                </button>
            </div>

            <div id="default-list-panel" class="bg-[#141414] rounded-3xl p-8 text-white w-full overflow-hidden">
                <h4 class="text-[11px] font-black uppercase tracking-[0.2em] mb-6 opacity-40">Score par département</h4>
                <div id="dept-list" class="grid grid-cols-1 gap-2.5"></div>
            </div>
        </div>

    <div class="max-w-7xl mx-auto mt-8 text-center text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">
        Données Comparatives • Indice Confort Habitat 2026
    </div>

    <script>
        const DEPARTMENTS_DATA = [
            { id: '75', name: 'Paris', color: '#649774', totalScore: "68,5", details: [{label: "Espace de vie", score: "4,7", icon: "layout-grid"}, {label: "Luminosité", score: "6", icon: "sun"}, {label: "Confort thermique", score: "7,4", icon: "wind"}, {label: "Calme résidentiel", score: "6,8", icon: "volume-x"}, {label: "Transports", score: "8,3", icon: "train"}, {label: "Services", score: "4,7", icon: "star"}] },
            { id: '77', name: 'Seine-et-Marne', color: '#3F624C', totalScore: "68,6", details: [{label: "Espace de vie", score: "6,8", icon: "layout-grid"}, {label: "Luminosité", score: "6,1", icon: "sun"}, {label: "Confort thermique", score: "8", icon: "wind"}, {label: "Calme résidentiel", score: "7,2", icon: "volume-x"}, {label: "Transports", score: "3,7", icon: "train"}, {label: "Services", score: "5,6", icon: "star"}] },
            { id: '78', name: 'Yvelines', color: '#AD6A24', totalScore: "67,5", details: [{label: "Espace de vie", score: "5,9", icon: "layout-grid"}, {label: "Luminosité", score: "5,6", icon: "sun"}, {label: "Confort thermique", score: "8", icon: "wind"}, {label: "Calme résidentiel", score: "6,9", icon: "volume-x"}, {label: "Transports", score: "3,8", icon: "train"}, {label: "Services", score: "6,7", icon: "star"}] },
            { id: '91', name: 'Essonne', color: '#B58D4D', totalScore: "68,6", details: [{label: "Espace de vie", score: "4,5", icon: "layout-grid"}, {label: "Luminosité", score: "6,5", icon: "sun"}, {label: "Confort thermique", score: "8", icon: "wind"}, {label: "Calme résidentiel", score: "6,5", icon: "volume-x"}, {label: "Transports", score: "4,6", icon: "train"}, {label: "Services", score: "6,1", icon: "star"}] },
            { id: '92', name: 'Hauts-de-Seine', color: '#F5A04B', totalScore: "68,9", details: [{label: "Espace de vie", score: "5,8", icon: "layout-grid"}, {label: "Luminosité", score: "6,2", icon: "sun"}, {label: "Confort thermique", score: "7,7", icon: "wind"}, {label: "Calme résidentiel", score: "6,9", icon: "volume-x"}, {label: "Transports", score: "6,4", icon: "train"}, {label: "Services", score: "5,6", icon: "star"}] },
            { id: '93', name: 'Seine-Saint-Denis', color: '#87B391', totalScore: "69,1", details: [{label: "Espace de vie", score: "6", icon: "layout-grid"}, {label: "Luminosité", score: "6,2", icon: "sun"}, {label: "Confort thermique", score: "8", icon: "wind"}, {label: "Calme résidentiel", score: "7,1", icon: "volume-x"}, {label: "Transports", score: "5,4", icon: "train"}, {label: "Services", score: "5,6", icon: "star"}] },
            { id: '94', name: 'Val-de-Marne', color: '#E6C28C', totalScore: "66,8", details: [{label: "Espace de vie", score: "5,2", icon: "layout-grid"}, {label: "Luminosité", score: "6,6", icon: "sun"}, {label: "Confort thermique", score: "7,8", icon: "wind"}, {label: "Calme résidentiel", score: "6,8", icon: "volume-x"}, {label: "Transports", score: "5,4", icon: "train"}, {label: "Services", score: "5,5", icon: "star"}] },
            { id: '95', name: "Val-d'Oise", color: '#9c6d44', totalScore: "65,7", details: [{label: "Espace de vie", score: "5,3", icon: "layout-grid"}, {label: "Luminosité", score: "6,3", icon: "sun"}, {label: "Confort thermique", score: "7,9", icon: "wind"}, {label: "Calme résidentiel", score: "7,2", icon: "volume-x"}, {label: "Transports", score: "3,8", icon: "train"}, {label: "Services", score: "5,9", icon: "star"}] }
        ];

        const defaultPanel = document.getElementById('default-list-panel');
        const activePanel = document.getElementById('info-panel-active');
        const hint = document.getElementById('map-hint');

        function updateUI(id) {
            const data = DEPARTMENTS_DATA.find(d => d.id === id);
            if (!data) return;

            defaultPanel.style.display = 'none';
            hint.style.display = 'none';
            activePanel.style.display = 'block';

            document.getElementById('active-id').innerText = "Département " + data.id;
            document.getElementById('active-name').innerText = data.name;
            document.getElementById('active-score').innerText = data.totalScore;
            activePanel.style.borderTopColor = data.color;

            const detailsHtml = data.details.map(item => `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-center gap-5">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0" style="background-color: ${data.color}">
                        <i data-lucide="${item.icon}" class="w-4 h-4"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-end mb-1.5">
                            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">${item.label}</div>
                            <div class="text-md font-black text-slate-900">${item.score}/10</div>
                        </div>
                        <div class="relative h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                            <div class="progress-bar absolute h-full rounded-full" style="width: ${parseFloat(item.score.replace(',', '.')) * 10}%; background-color: ${data.color}"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('active-details').innerHTML = detailsHtml;
            lucide.createIcons();
        }

        // Fonction pour revenir à la liste globale
        function resetUI() {
            activePanel.style.display = 'none';
            defaultPanel.style.display = 'block';
            hint.style.display = 'flex';
        }

        // Init list
        const listContainer = document.getElementById('dept-list');
        DEPARTMENTS_DATA.forEach(d => {
            const btn = document.createElement('button');
            btn.className = "flex items-center justify-between group px-4 py-3 rounded-xl transition-all duration-300 border border-slate-800 bg-slate-800/30 text-slate-300 hover:bg-slate-800 w-full";
            btn.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${d.color}"></div>
                    <span class="text-xs font-bold uppercase">${d.name}</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-white">${d.totalScore}</span>
                    <i data-lucide="chevron-right" class="w-3 h-3 text-slate-700"></i>
                </div>
            `;
            btn.onmouseenter = () => {
                updateUI(d.id);
                document.querySelectorAll('.dept-path').forEach(p => p.style.opacity = '0.4');
                const path = document.getElementById('path-' + d.id);
                if(path) {
                    path.style.opacity = '1';
                    path.setAttribute('stroke-width', '3');
                }
            };
            btn.onmouseleave = () => {
                document.querySelectorAll('.dept-path').forEach(p => {
                    p.style.opacity = '1';
                    p.setAttribute('stroke-width', '1');
                });
            };
            listContainer.appendChild(btn);
        });

        // Interactivité Carte
        document.querySelectorAll('.dept-path').forEach(path => {
            const id = path.id.split('-')[1];
            path.addEventListener('mouseenter', () => updateUI(id));
        });

        lucide.createIcons();
    </script>
